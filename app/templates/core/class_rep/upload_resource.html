{% extends 'base.html' %}

{% block content %}
<div class="space-y-6 max-w-4xl">
    <div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Upload Resource</h1>
        <p class="text-sm text-gray-500 mt-1">Publish notes to the system and target specific levels and programs.</p>
    </div>

    <form action="{{ url_for('core.upload_resource') }}" method="POST" enctype="multipart/form-data" class="space-y-8">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

            <div>
                <label for="module_id" class="block text-sm font-medium text-gray-700">Module Name</label>
                <select id="module_id" name="module_id" required
                        class="mt-2 block w-full px-0 py-3 bg-transparent border-0 border-b border-gray-200 text-base text-gray-900 focus:outline-none focus:ring-0 focus:border-gray-900 transition-colors cursor-pointer appearance-none">
                    <option value="" disabled selected class="text-gray-300">Select Registered Module</option>
                    {% for module in modules %}
                        <option value="{{ module.id }}">{{ module.name }} ({{ module.code }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Document Title</label>
                <input type="text" id="title" name="title" required
                       placeholder="e.g. End of Sem Revision Notes"
                       class="mt-2 block w-full px-0 py-3 bg-transparent border-0 border-b border-gray-200 text-base text-gray-900 focus:outline-none focus:ring-0 focus:border-gray-900 transition-colors placeholder-gray-300">
            </div>

            <div>
                <label for="academic_year" class="block text-sm font-medium text-gray-700">Target Year</label>
                <div class="relative">
                    <select id="academic_year" name="academic_year" required
                            class="mt-2 block w-full px-0 py-3 bg-transparent border-0 border-b border-gray-200 text-base text-gray-900 focus:outline-none focus:ring-0 focus:border-gray-900 transition-colors cursor-pointer appearance-none">
                        <option value="" disabled selected class="text-gray-300">Select Target Year</option>
                        <option value="1">Year 1</option>
                        <option value="2">Year 2</option>
                        <option value="3">Year 3</option>
                        <option value="4">Year 4</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <div>
                <label for="semester" class="block text-sm font-medium text-gray-700">Target Semester</label>
                <div class="relative">
                    <select id="semester" name="semester" required
                            class="mt-2 block w-full px-0 py-3 bg-transparent border-0 border-b border-gray-200 text-base text-gray-900 focus:outline-none focus:ring-0 focus:border-gray-900 transition-colors cursor-pointer appearance-none">
                        <option value="" disabled selected class="text-gray-300">Select Semester</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="pt-4">
            <label class="block text-sm font-medium text-gray-700 mb-4">Target Programs</label>
            <p class="text-xs text-gray-500 mb-4">Select which programs should have access to these notes.</p>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                {% for program in programs %}
                <label class="relative flex items-center p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors group">
                    <input type="checkbox" name="programs" value="{{ program.id }}" class="sr-only peer">
                    <div class="w-4 h-4 border border-gray-300 rounded mr-3 flex items-center justify-center peer-checked:bg-gray-900 peer-checked:border-gray-900 transition-colors">
                        <svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <span class="text-sm font-medium text-gray-900">{{ program.name }}</span>
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="pt-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">Upload Document (PDF)</label>
            <div class="flex items-center justify-center w-full">
                <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                    <div id="dropzone-text" class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                        <svg class="w-8 h-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="text-sm text-gray-500"><span class="font-semibold">Click to upload</span> or drag and drop</p>
                        <p class="text-xs text-gray-400 mt-1">PDF format only</p>
                    </div>
                    <input id="dropzone-file" type="file" name="file" accept="application/pdf" class="hidden" required />
                </label>
            </div>
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="w-full sm:w-auto px-10 py-3 bg-gray-900 hover:bg-black text-white text-sm font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900">
                Publish Resource
            </button>
        </div>
    </form>
</div>

<script>
    const fileInput = document.getElementById('dropzone-file');
    const dropzoneText = document.getElementById('dropzone-text');

    fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            const filename = this.files[0].name;
            dropzoneText.innerHTML = `
                <svg class="w-10 h-10 text-emerald-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-sm font-semibold text-gray-900">${filename}</p>
                <p class="text-xs text-emerald-500 mt-1">File selected! Ready to upload.</p>
            `;
        }
    });
</script>
{% endblock %}
