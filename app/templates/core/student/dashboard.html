{% extends 'base.html' %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
        <p class="text-sm text-gray-500 mt-1">Overview of your activity and quick links.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="p-6 bg-white border border-gray-200 rounded-lg">
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Recent Notifications</h3>
            <p class="text-sm text-gray-500">No new notices for today.</p>
        </div>
        <div class="p-6 bg-white border border-gray-200 rounded-lg">
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Saved Shortcuts</h3>
            <p class="text-sm text-gray-500">You haven't pinned any modules yet.</p>
        </div>
    </div>
</div>
{% endblock %}
