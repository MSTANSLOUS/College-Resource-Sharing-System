{% extends 'base.html' %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Account Profile</h1>
        <p class="text-sm text-gray-500 mt-1">Manage your student ID, phone number, and academic details.</p>
    </div>

    <div class="p-6 bg-white border border-gray-200 rounded-lg max-w-2xl">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Display Name</label>
                <input type="text" value="Guest" readonly class="mt-1 block w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Student ID</label>
                <input type="text" placeholder="Enter your student ID" class="mt-1 block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">
            </div>
            <div>
                <button class="px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">
                    Save Changes
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
