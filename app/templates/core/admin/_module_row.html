<tr class="block sm:table-row hover:bg-[#faf8f5] transition-colors border-b sm:border-b-0 border-[#f0ebe3] mb-4 sm:mb-0 rounded-xl sm:rounded-none shadow-sm sm:shadow-none">
    <td class="block sm:table-cell px-6 py-4 whitespace-nowrap">
        <span class="sm:hidden text-[10px] font-bold text-[#b5aaa0] uppercase tracking-wider block">Module</span>
        <div class="font-bold text-[#1a1a1a]">{{ module.name }}</div>
        <span class="text-[#6b5e50] font-mono text-xs bg-[#f5f2ec] border border-[#ede8e0] px-2 py-0.5 rounded font-black">#{{ module.code }}</span>
    </td>
    <td class="block sm:table-cell px-6 py-4">
        <span class="sm:hidden text-[10px] font-bold text-[#b5aaa0] uppercase tracking-wider block">Programs</span>
        <div class="flex flex-wrap gap-1.5">
            {% for p in module.programs %}
            <span class="bg-white border border-[#ede8e0] text-[#5a5248] px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide shadow-sm">{{ p.name }}</span>
            {% else %}
            <span class="text-[#b5aaa0] text-xs italic">No programs linked</span>
            {% endfor %}
        </div>
    </td>
    <td class="block sm:table-cell px-6 py-4 text-right whitespace-nowrap">
        <span class="sm:hidden text-[10px] font-bold text-[#b5aaa0] uppercase tracking-wider block">Action</span>
        <form action="{{ url_for('core.delete_module', module_id=module.id) }}" method="POST"
              class="admin-action-form" data-shimmer="Purging Curriculum Node &amp; Access Matrix Logs..."
              onsubmit="return confirm('Delete this module permanently? This cannot be undone.');">
            <button type="submit" class="text-rose-500 hover:text-rose-700 transition-colors cursor-pointer inline-flex items-center gap-1">
                <i class="fas fa-trash-alt text-xs"></i>
                <span class="text-[11px] font-bold uppercase">Delete</span>
            </button>
        </form>
    </td>
</tr>
