{% for log in logs %}
<tr class="hover:bg-[#faf8f5] transition-colors border-b border-[#f0ebe3]">
    <td class="px-4 py-3 text-sm text-[#b5aaa0] font-mono whitespace-nowrap">
        {{ log.created_at.strftime('%H:%M | %d %b %Y') }}
    </td>
    <td class="px-4 py-3 text-sm font-bold text-[#5a5248] whitespace-nowrap">
        {{ log.user.full_name if log.user else 'System Core' }}
    </td>
    <td class="px-4 py-3 text-sm text-[#1a1a1a]">
        <span class="font-bold bg-[#f5f2ec] border border-[#ede8e0] px-2 py-0.5 rounded mr-1">{{ log.action }}</span>
        {{ log.details }}
    </td>
</tr>
{% else %}
<tr>
    <td colspan="3" class="px-4 py-12 text-center text-[#b5aaa0]">
        <i class="fas fa-clipboard-list text-3xl block mb-2"></i>
        <p class="font-bold text-[#1a1a1a]">No logs found</p>
        <p class="text-sm mt-1">Try adjusting your filters.</p>
    </td>
</tr>
{% endfor %}
