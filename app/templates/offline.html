<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Student Resource System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f5f2ec] min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 sm:p-12 max-w-md w-full shadow-sm border border-[#ede8e0] text-center">
        <div class="text-6xl mb-6">📡</div>
        <h1 class="text-2xl font-bold text-[#1a1a1a] mb-2">You're Offline</h1>
        <p class="text-[#7a7268] text-sm mb-6">It looks like you've lost your connection. Some resources are still available.</p>
        <button onclick="location.reload()" class="w-full py-3 bg-[#1a1a1a] hover:bg-black text-white text-sm font-semibold rounded-xl transition-all">
            Try Again
        </button>
    </div>
</body>
</html>
